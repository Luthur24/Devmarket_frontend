<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CompetitorSearch — AI Competitive Intelligence</title>
<meta name="description" content="Real-time AI competitive intelligence. Battlecards, market maps, strategic playbooks and DNA scores powered by Tavily + Mistral AI."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#0a0a0b;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
img{max-width:100%}
input,textarea,select{font:inherit;color:inherit}
ul{list-style:none}

/* ─── Variables ─────────────────────────────────────────────────────────── */
:root{
  --gold:#c9a84c;
  --gold-lt:#e0c57a;
  --gold-bg:rgba(201,168,76,.1);
  --gold-bd:rgba(201,168,76,.22);
  --bg0:#0a0a0b;
  --bg1:#111115;
  --bg2:#18181d;
  --bg3:#1f1f26;
  --bd:rgba(255,255,255,.07);
  --bd2:rgba(255,255,255,.13);
  --muted:#666;
  --text:#e0e0e0;
  --green:#3ecf8e;
  --red:#f05454;
  --blue:#4a9eff;
  --amber:#f5c518;
  --purple:#a78bfa;
  --r:12px;
  --r2:18px;
  --r3:24px;
}

/* ─── Keyframes ─────────────────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spinR{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{color:var(--gold)}50%{color:var(--gold-lt);filter:drop-shadow(0 0 28px rgba(201,168,76,.65))}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tickFade{0%{opacity:0;transform:translateY(7px)}12%{opacity:1;transform:translateY(0)}85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-7px)}}

/* ─── Utilities ─────────────────────────────────────────────────────────── */
.container{max-width:1200px;margin:0 auto;padding:0 28px}
.gold{color:var(--gold)}
.muted{color:var(--muted)}
.fadeUp{animation:fadeUp .55s ease both}
.fadeIn{animation:fadeIn .3s ease both}
h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;line-height:1.1}

/* ─── Particles ─────────────────────────────────────────────────────────── */
#cs-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5}
#cs-root{position:relative;z-index:1;min-height:100vh}

/* ─── Navbar ─────────────────────────────────────────────────────────────── */
.cs-nav{position:sticky;top:0;z-index:90;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(10,10,11,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--bd)}
.cs-brand{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.cs-brand-icon{width:32px;height:32px;border-radius:7px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:11px;color:#0a0a0b;letter-spacing:-.3px;flex-shrink:0}
.cs-brand-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#fff}
.cs-brand-name span{color:var(--gold)}
.cs-nav-links{display:flex;gap:2px}
.cs-nav-link{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:color .18s,background .18s;white-space:nowrap}
.cs-nav-link:hover{color:var(--text);background:var(--bg2)}
.cs-nav-link.active{color:var(--text)}
.cs-nav-right{display:flex;align-items:center;gap:8px}

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;transition:all .18s;cursor:pointer;white-space:nowrap}
.btn-gold{background:var(--gold);color:#0a0a0b}.btn-gold:hover{background:var(--gold-lt);transform:translateY(-1px)}
.btn-ghost{border:1px solid var(--bd2);color:var(--muted)}.btn-ghost:hover{border-color:var(--bd2);color:var(--text);background:var(--bg2)}
.btn-outline{border:1px solid var(--gold-bd);color:var(--gold);background:var(--gold-bg)}.btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,.18)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:8px}
.btn-icon{padding:7px 14px;font-size:13px;font-weight:500;border:1px solid var(--bd);color:var(--muted);border-radius:9px;background:transparent;transition:all .18s}
.btn-icon:hover{border-color:var(--bd2);color:var(--text)}
.btn-icon.saved{border-color:rgba(62,207,142,.3);color:var(--green);background:rgba(62,207,142,.07)}

/* ─── Badges ─────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.badge-gold{border:1px solid var(--gold-bd);background:var(--gold-bg);color:var(--gold)}
.badge-green{border:1px solid rgba(62,207,142,.25);background:rgba(62,207,142,.08);color:var(--green)}
.badge-red{border:1px solid rgba(240,84,84,.25);background:rgba(240,84,84,.07);color:var(--red)}
.badge-blue{border:1px solid rgba(74,158,255,.25);background:rgba(74,158,255,.07);color:var(--blue)}
.badge-amber{border:1px solid rgba(245,197,24,.25);background:rgba(245,197,24,.07);color:var(--amber)}
.badge-purple{border:1px solid rgba(167,139,250,.25);background:rgba(167,139,250,.07);color:var(--purple)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.8s infinite;flex-shrink:0}

/* ─── Cards ──────────────────────────────────────────────────────────────── */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r2)}
.card-hover{transition:border-color .2s,transform .2s}
.card-hover:hover{border-color:var(--gold-bd);transform:translateY(-2px)}

/* ─── Hero ───────────────────────────────────────────────────────────────── */
.cs-hero{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 28px 50px;position:relative}
.cs-eyebrow{display:inline-flex;align-items:center;gap:7px;padding:5px 15px;border-radius:20px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.07);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);margin-bottom:30px}
.cs-hero-title{font-size:clamp(40px,8vw,88px);font-weight:800;letter-spacing:-2.5px;line-height:1.03;margin-bottom:20px}
.cs-hero-title .glow-word{animation:glow 3s ease-in-out infinite}
.cs-hero-sub{font-size:17px;color:var(--muted);max-width:520px;line-height:1.8;margin-bottom:38px}

/* ─── Search Box ─────────────────────────────────────────────────────────── */
.cs-search-wrap{width:100%;max-width:650px;position:relative;margin:0 auto 16px}
.cs-search-row{display:flex;background:rgba(255,255,255,.035);border:1px solid var(--bd2);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.cs-search-row:focus-within{border-color:var(--gold-bd);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.cs-search-icon{display:flex;align-items:center;padding:0 10px 0 18px;color:var(--muted);font-size:17px;pointer-events:none}
.cs-search-input{flex:1;padding:15px 6px;background:transparent;border:none;outline:none;font-size:16px;color:var(--text)}
.cs-search-input::placeholder{color:var(--muted)}
.cs-search-btn{margin:6px;padding:10px 24px;border-radius:11px;font-size:15px;font-weight:700;background:var(--gold);color:#0a0a0b;transition:background .18s}
.cs-search-btn:hover{background:var(--gold-lt)}
.cs-suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg1);border:1px solid var(--bd2);border-radius:var(--r2);z-index:99;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.6);animation:slideDown .18s ease}
.cs-sug-item{display:flex;align-items:center;gap:10px;padding:11px 18px;font-size:14px;cursor:pointer;transition:background .15s;color:var(--text)}
.cs-sug-item:hover,.cs-sug-item.focused{background:var(--bg2)}
.cs-sug-icon{color:var(--muted);font-size:12px;flex-shrink:0}
.cs-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.cs-chip{padding:5px 15px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--bd);color:var(--muted);cursor:pointer;transition:all .18s}
.cs-chip:hover{border-color:var(--gold-bd);color:var(--gold);background:var(--gold-bg)}
.cs-kbd-hint{font-size:12px;color:var(--muted);margin-top:12px;opacity:.7}
kbd{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border:1px solid var(--bd2);border-radius:5px;font-family:monospace;font-size:10px;background:var(--bg2);color:var(--muted)}

/* ─── Ticker ─────────────────────────────────────────────────────────────── */
.cs-ticker{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;background:rgba(201,168,76,.05);border:1px solid var(--gold-bd);border-radius:12px;margin-top:22px;font-size:13px;max-width:440px}
.cs-ticker-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);white-space:nowrap}
.cs-ticker-text{color:var(--muted);animation:tickFade 5s ease-in-out infinite;min-height:19px}

/* ─── Marquee ────────────────────────────────────────────────────────────── */
.cs-marquee-wrap{overflow:hidden;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:13px 0}
.cs-marquee-track{display:flex;gap:36px;animation:marquee 30s linear infinite;width:max-content}
.cs-marquee-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;cursor:pointer;transition:color .18s}
.cs-marquee-item:hover{color:var(--text)}
.cs-mlogo{width:18px;height:18px;border-radius:4px;background:var(--bg2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted)}
.cs-mlogo img{width:100%;height:100%;object-fit:contain}

/* ─── Stats ──────────────────────────────────────────────────────────────── */
.cs-stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bd);gap:1px;border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin:40px 0}
.cs-stat{background:var(--bg1);padding:22px;text-align:center}
.cs-stat-n{font-size:28px;font-weight:800;color:var(--gold);font-family:'Space Grotesk',sans-serif}
.cs-stat-l{font-size:12px;color:var(--muted);margin-top:3px}

/* ─── Home Layout ────────────────────────────────────────────────────────── */
.cs-home-layout{display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start}
.cs-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:10px}

/* ─── Trending Grid ──────────────────────────────────────────────────────── */
.cs-trending-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cs-trend-card{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--bd);background:var(--bg1);border-radius:var(--r);cursor:pointer;transition:all .18s}
.cs-trend-card:hover{border-color:var(--gold-bd);background:var(--gold-bg)}
.cs-trend-logo{width:34px;height:34px;border-radius:8px;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.cs-trend-logo img{width:100%;height:100%;object-fit:contain}
.cs-trend-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs-trend-cat{font-size:11px;color:var(--muted)}
.cs-trend-arrow{color:var(--muted);margin-left:auto;flex-shrink:0}

/* ─── Feature Cards ──────────────────────────────────────────────────────── */
.cs-feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cs-feat-card{border:1px solid var(--bd);background:var(--bg1);border-radius:var(--r2);overflow:hidden;transition:all .2s}
.cs-feat-card:hover{border-color:var(--gold-bd);transform:translateY(-3px)}
.cs-feat-img{width:100%;height:140px;object-fit:cover;opacity:.65;display:block;border-radius:0}
.cs-feat-card:hover .cs-feat-img{opacity:.85}
.cs-feat-body{padding:16px}
.cs-feat-ico{font-size:18px;margin-bottom:8px}
.cs-feat-title{font-size:14px;font-weight:700;margin-bottom:5px}
.cs-feat-desc{font-size:12px;color:var(--muted);line-height:1.65}

/* ─── Steps ──────────────────────────────────────────────────────────────── */
.cs-steps{display:flex;gap:0}
.cs-step{flex:1;background:var(--bg1);border:1px solid var(--bd);padding:16px;position:relative}
.cs-step:not(:last-child){border-right:none}
.cs-step:first-child{border-radius:var(--r2) 0 0 var(--r2)}
.cs-step:last-child{border-radius:0 var(--r2) var(--r2) 0}
.cs-step-n{font-size:9px;font-weight:700;color:var(--gold);font-family:monospace;letter-spacing:.05em;margin-bottom:5px}
.cs-step-a{font-size:13px;font-weight:700}
.cs-step-d{font-size:11px;color:var(--muted);margin-top:2px}

/* ─── Sidebar ────────────────────────────────────────────────────────────── */
.cs-sb-box{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.cs-sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.cs-hist-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;transition:background .15s}
.cs-hist-item:hover{background:var(--bg2)}
.cs-hist-q{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.cs-hist-t{font-size:11px;color:var(--muted);flex-shrink:0}
.cs-ad-box{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.cs-ad-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-left:2px solid var(--gold);padding-left:7px;margin-bottom:8px}
.cs-ad-price{font-size:24px;font-weight:800;color:var(--gold);font-family:'Space Grotesk',sans-serif;margin:5px 0 2px}
.cs-ad-reach{font-size:11px;color:var(--muted);margin-bottom:10px}

/* ─── Results ────────────────────────────────────────────────────────────── */
.cs-results-hdr{padding:22px 0 16px;border-bottom:1px solid var(--bd);margin-bottom:22px}
.cs-results-q{font-size:24px;font-weight:700;margin:8px 0 10px}
.cs-pipeline{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.cs-pipe{flex:1;min-width:90px;display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:9px;border:1px solid var(--bd);background:var(--bg1);font-size:11px;font-weight:600;color:var(--muted);transition:all .4s}
.cs-pipe.active{border-color:var(--gold-bd);background:var(--gold-bg);color:var(--gold)}
.cs-pipe.done{border-color:rgba(62,207,142,.25);background:rgba(62,207,142,.05);color:var(--green)}
.cs-pipe-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1s infinite;flex-shrink:0}
.cs-tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:22px;overflow-x:auto}
.cs-tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .18s;white-space:nowrap}
.cs-tab:hover{color:var(--text)}
.cs-tab.on{color:var(--gold);border-color:var(--gold)}
.cs-tp{display:none}
.cs-tp.on{display:block;animation:fadeIn .25s ease}

/* ─── Tab Content Components ─────────────────────────────────────────────── */
.cs-box{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;margin-bottom:16px}
.cs-box-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gold);margin-bottom:11px}
.cs-box-text{font-size:14px;color:#ccc;line-height:1.85}
.cs-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cs-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cs-mini-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.cs-mini-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.cs-mini-li li{display:flex;align-items:flex-start;gap:5px;font-size:12px;color:#bbb;padding:3px 0;border-bottom:1px solid var(--bd);line-height:1.55}
.cs-mini-li li:last-child{border:none}
.cs-mini-li li::before{content:'·';color:var(--gold);font-size:14px;line-height:1.3;flex-shrink:0}
.cs-predicted{display:flex;flex-direction:column;gap:8px}
.cs-pred-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:11px;border:1px solid rgba(245,197,24,.18);background:rgba(245,197,24,.04);font-size:13px;color:#ddd;line-height:1.65}
.cs-pred-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 8px;border-radius:5px;background:rgba(245,197,24,.16);color:var(--amber);flex-shrink:0;white-space:nowrap;margin-top:2px}
.cs-comp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.cs-comp-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r2);padding:18px}
.cs-comp-hdr{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.cs-comp-logo{width:38px;height:38px;border-radius:8px;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
.cs-comp-logo img{width:100%;height:100%;object-fit:contain}
.cs-comp-name{font-size:15px;font-weight:700}
.cs-comp-cat{font-size:11px;color:var(--muted)}
.cs-comp-desc{font-size:12px;color:#bbb;line-height:1.65;margin-bottom:10px}
.cs-comp-meta{display:flex;gap:16px;margin:10px 0}
.cs-comp-mi strong{display:block;font-size:12px;color:var(--text)}
.cs-comp-mi span{font-size:11px;color:var(--muted)}
.cs-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.cs-tag-str{padding:3px 9px;border-radius:20px;font-size:11px;background:rgba(62,207,142,.07);border:1px solid rgba(62,207,142,.18);color:var(--green)}
.cs-tag-weak{padding:3px 9px;border-radius:20px;font-size:11px;background:rgba(240,84,84,.07);border:1px solid rgba(240,84,84,.18);color:var(--red)}
.cs-chart-wrap{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;position:relative}
.cs-chart-xl{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cs-chart-yl{position:absolute;left:10px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cs-chart-canvas{height:340px}
.cs-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.cs-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.cs-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cs-bc{margin-bottom:16px;border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.cs-bc-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--bg2);border-bottom:1px solid var(--bd)}
.cs-bc-title{font-weight:700;font-size:15px}
.cs-wr{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.cs-wr-h{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.25);color:var(--green)}
.cs-wr-m{background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.25);color:var(--amber)}
.cs-wr-l{background:rgba(240,84,84,.12);border:1px solid rgba(240,84,84,.25);color:var(--red)}

<body>

<canvas id="cs-canvas"></canvas>
<div id="cs-root"></div>

<script>
// ─── Particles ────────────────────────────────────────────────────────────
(function() {
  var c = document.getElementById('cs-canvas');
  var ctx = c.getContext('2d');
  var pts = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (var i = 0; i < 52; i++) {
    pts.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight,
      dx: (Math.random() - .5) * .28, dy: (Math.random() - .5) * .28,
      r: Math.random() * 1.3 + .4, o: Math.random() * .38 + .07 });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(201,168,76,' + p.o + ')'; ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = c.width; if (p.x > c.width) p.x = 0;
      if (p.y < 0) p.y = c.height; if (p.y > c.height) p.y = 0;
      for (var j = i + 1; j < pts.length; j++) {
        var q = pts[j], ddx = p.x - q.x, ddy = p.y - q.y, d = Math.sqrt(ddx*ddx + ddy*ddy);
        if (d < 88) {
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = 'rgba(201,168,76,' + (.065 * (1 - d / 88)) + ')';
          ctx.lineWidth = .5; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── Config ───────────────────────────────────────────────────────────────
var API = '/api';

// ─── State ────────────────────────────────────────────────────────────────
var CS = {
  history: [],
  library: [],
  activeCharts: [],
  currentData: null,
  marketData: null,
  dnaData: null,
  dnaQuery: ''
};
try { CS.history = JSON.parse(localStorage.getItem('cs_history') || '[]'); } catch(e) {}
try { CS.library = JSON.parse(localStorage.getItem('cs_library') || '[]'); } catch(e) {}

function csStore(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

// ─── Router ───────────────────────────────────────────────────────────────
function csGo(path) { location.hash = '#' + path; }
function csRoute() {
  csKillCharts();
  var hash = location.hash.replace(/^#/, '') || '/';
  var parts = hash.split('/').filter(Boolean);
  var page = '/' + (parts[0] || '');
  document.getElementById('cs-root').innerHTML = csNavHTML() + '<div id="cs-pg"></div>' + csFootHTML();
  csWireNav(page);
  var map = {
    '/': csPageHome,
    '/results': function() { csPageResults(decodeURIComponent(parts.slice(1).join('/'))); },
    '/about': csPageAbout,
    '/features': csPageFeatures,
    '/terms': csPageTerms,
    '/guidelines': csPageGuidelines,
    '/pitch': csPagePitch,
    '/battle': csPageBattle
  };
  var fn = map[page] || csPageHome;
  fn();
}
function csKillCharts() {
  CS.activeCharts.forEach(function(c) { try { c.destroy(); } catch(e) {} });
  CS.activeCharts = [];
}
window.addEventListener('hashchange', csRoute);
window.addEventListener('load', csRoute);

// ─── HTML Escape ──────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── Time Ago ─────────────────────────────────────────────────────────────
function ago(ts) {
  var d = Date.now() - ts;
  if (d < 60000) return 'just now';
  if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
  if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
  return Math.floor(d / 86400000) + 'd ago';
}

// ─── Copy to Clipboard ────────────────────────────────────────────────────
function csCopy(text) {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).catch(function() {}); return; }
  var el = document.createElement('textarea');
  el.value = text; document.body.appendChild(el); el.select();
  document.execCommand('copy'); document.body.removeChild(el);
}

// ─── Toast ────────────────────────────────────────────────────────────────
function csToast(msg) {
  var el = document.createElement('div');
  el.className = 'cs-toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() {
    el.style.transition = 'opacity .4s'; el.style.opacity = '0';
    setTimeout(function() { el.remove(); }, 400);
  }, 2800);
}

// ─── Nav HTML ─────────────────────────────────────────────────────────────
function csNavHTML() {
  return '<nav class="cs-nav">' +
    '<div class="cs-brand" onclick="csGo(\'/\')">' +
      '<div class="cs-brand-icon">CS</div>' +
      '<div class="cs-brand-name">Competitor<span>Search</span></div>' +
    '</div>' +
    '<div class="cs-nav-links">' +
      '<span class="cs-nav-link" onclick="csGo(\'/about\')">About</span>' +
      '<span class="cs-nav-link" onclick="csGo(\'/features\')">Features</span>' +
      '<span class="cs-nav-link" onclick="csGo(\'/battle\')">Battle Mode</span>' +
      '<span class="cs-nav-link" onclick="csGo(\'/pitch\')">Pitch Deck</span>' +
    '</div>' +
    '<div class="cs-nav-right">' +
      '<button class="btn btn-ghost btn-sm" onclick="csShowLib()">Library</button>' +
      '<button class="btn btn-gold btn-sm" onclick="csShowAd()">Advertise $10</button>' +
    '</div>' +
  '</nav>';
}
function csWireNav(page) {
  var links = document.querySelectorAll('.cs-nav-link');
  var pageMap = {'About':'/about','Features':'/features','Battle Mode':'/battle','Pitch Deck':'/pitch'};
  links.forEach(function(el) {
    var p = pageMap[el.textContent];
    if (p && page === p) el.classList.add('active');
  });
}

// ─── Footer HTML ──────────────────────────────────────────────────────────
function csFootHTML() {
  return '<footer class="cs-footer"><div class="container">' +
    '<div class="cs-footer-grid">' +
      '<div><div class="cs-footer-brand">CompetitorSearch</div>' +
        '<div class="cs-footer-desc">The global intelligence layer for competitive businesses. Real-time AI analysis powered by Tavily + Mistral AI.</div></div>' +
      '<div><div class="cs-footer-col-title">Product</div>' +
        '<span class="cs-footer-link" onclick="csGo(\'/features\')">Features</span>' +
        '<span class="cs-footer-link" onclick="csGo(\'/battle\')">Battle Mode</span>' +
        '<span class="cs-footer-link" onclick="csGo(\'/pitch\')">Pitch Deck</span>' +
        '<span class="cs-footer-link" onclick="csShowAd()">Advertise</span></div>' +
      '<div><div class="cs-footer-col-title">Company</div>' +
        '<span class="cs-footer-link" onclick="csGo(\'/about\')">About</span>' +

var SUGS = ['OpenAI','Notion','Stripe','Figma','Vercel','Linear','Shopify','HubSpot','Canva','Slack',

function csInitSearch() {
  var inp = document.getElementById('cs-main-input');
  var wrap = document.getElementById('cs-search-wrap');
  if (!inp || !wrap) return;
  var sugEl = null, focusIdx = -1;

  function hideSugs() { if (sugEl) { sugEl.remove(); sugEl = null; } focusIdx = -1; }
  function showSugs(items) {
    hideSugs();
    if (!items.length) return;
    sugEl = document.createElement('div');
    sugEl.className = 'cs-suggest';
    sugEl.innerHTML = items.map(function(s, i) {
      return '<div class="cs-sug-item" data-i="' + i + '" onclick="csSearch(\'' + esc(s) + '\')">' +
        '<span class="cs-sug-icon">&#8599;</span>' + esc(s) + '</div>';
    }).join('');
    wrap.appendChild(sugEl);
  }
  inp.addEventListener('input', function() {
    var v = inp.value.trim().toLowerCase();
    if (!v) { hideSugs(); return; }
    var hist = CS.history.filter(function(h) { return h.query.toLowerCase().indexOf(v) !== -1; }).map(function(h) { return h.query; }).slice(0, 3);
    var sugs = SUGS.filter(function(s) { return s.toLowerCase().indexOf(v) !== -1; }).slice(0, 5);
    var combined = [];
    hist.forEach(function(s) { if (combined.indexOf(s) === -1) combined.push(s); });
    sugs.forEach(function(s) { if (combined.indexOf(s) === -1) combined.push(s); });
    showSugs(combined.slice(0, 7));
  });
  inp.addEventListener('keydown', function(e) {
    if (!sugEl) {
      if (e.key === 'Enter') { var v = inp.value.trim(); if (v) csSearch(v); }
      return;
    }
    var items = sugEl.querySelectorAll('.cs-sug-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); focusIdx = Math.min(focusIdx + 1, items.length - 1); items.forEach(function(el, i) { el.classList.toggle('focused', i === focusIdx); }); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); focusIdx = Math.max(focusIdx - 1, -1); items.forEach(function(el, i) { el.classList.toggle('focused', i === focusIdx); }); }
    else if (e.key === 'Enter') { e.preventDefault(); if (focusIdx >= 0 && items[focusIdx]) items[focusIdx].click(); else { var v = inp.value.trim(); if (v) csSearch(v); } }
    else if (e.key === 'Escape') hideSugs();
  });
  document.addEventListener('click', function(e) { if (wrap && !wrap.contains(e.target)) hideSugs(); });
}
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    var inp = document.getElementById('cs-main-input');
    if (inp) inp.focus();
  }
});

function csPageResults(query) {
  if (!query) { csGo('/'); return; }

  // Save to history
  CS.history = [{query: query, ts: Date.now()}].concat(CS.history.filter(function(h) { return h.query !== query; })).slice(0, 20);
  csStore('cs_history', CS.history);

  var PIPE_NAMES = ['Query','Live Search','Extraction','AI Analysis','Report'];

  document.getElementById('cs-pg').innerHTML =
    '<div class="container" style="padding:22px 28px 60px">' +
      '<div class="cs-results-hdr">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
          '<button class="btn btn-ghost btn-sm" onclick="csGo(\'/\')">&#8592; Back</button>' +
          '<span class="badge badge-gold"><span class="live-dot"></span> Live Analysis</span>' +
        '</div>' +
        '<div class="cs-results-q">' + esc(query) + '</div>' +
      '</div>' +
      '<div class="cs-pipeline" id="cs-pipeline">' +
        PIPE_NAMES.map(function(n, i) {
          return '<div class="cs-pipe" id="cs-p' + i + '"><div class="cs-pipe-dot"></div>' + n + '</div>';
        }).join('') +
      '</div>' +
      '<div id="cs-rbody"><div class="cs-loading"><div class="cs-spinner"></div><div class="muted" style="font-size:14px">Generating intelligence report...</div></div></div>' +
    '</div>';

  // Animate pipeline stages
  var delays = [0, 1200, 2600, 4000, 5600];
  delays.forEach(function(delay, i) {
    setTimeout(function() {
      for (var j = 0; j < i; j++) {
        var el = document.getElementById('cs-p' + j);
        if (el) { el.className = 'cs-pipe done'; el.innerHTML = '&#10003; ' + PIPE_NAMES[j]; }
      }
      var cur = document.getElementById('cs-p' + i);
      if (cur) { cur.className = 'cs-pipe active'; }
    }, delay);
  });

  // Fetch
  fetch(API + '/intelligence/search', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query: query})
  })
  .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
  .then(function(res) {
    var rbody = document.getElementById('cs-rbody');
    if (!rbody) return;
    if (!res.ok) {
      rbody.innerHTML = '<div class="cs-error">' + esc(res.data.error || 'Analysis failed. Please try again.') + '</div>';
      return;
    }
    PIPE_NAMES.forEach(function(n, i) {
      var el = document.getElementById('cs-p' + i);
      if (el) { el.className = 'cs-pipe done'; el.innerHTML = '&#10003; ' + n; }
    });
    csRenderReport(query, res.data);
  })
  .catch(function(e) {
    var rbody = document.getElementById('cs-rbody');
    if (rbody) rbody.innerHTML = '<div class="cs-error">Network error: ' + esc(e.message) + '<br><br>Make sure the API server is running.</div>';
  });
}

// ─── Save / Export / Share ────────────────────────────────────────────────
function csToggleSave(query) {
  var idx = CS.library.findIndex ? CS.library.findIndex(function(l) { return l.query === query; }) : -1;
  if (idx < 0) { for (var i = 0; i < CS.library.length; i++) { if (CS.library[i].query === query) { idx = i; break; } } }
  if (idx >= 0) CS.library.splice(idx, 1);
  else CS.library.unshift({query: query, ts: Date.now(), data: CS.currentData});
  csStore('cs_library', CS.library);
  var btn = document.getElementById('cs-savebtn');
  var nowSaved = CS.library.some(function(l) { return l.query === query; });
  if (btn) {
    btn.className = 'btn btn-icon' + (nowSaved ? ' saved' : '');
    btn.innerHTML = nowSaved ? '&#10003; Saved' : '&#8853; Save';
  }
  csToast(nowSaved ? 'Saved to Library' : 'Removed from Library');
}

function csExport(query) {
  var d = CS.currentData;
  if (!d) return;
  var md = '# Competitive Intelligence Report: ' + query + '\n_Generated ' + new Date().toLocaleString() + ' via CompetitorSearch_\n\n';
  md += '## Overview\n' + (d.overview || '') + '\n\n';
  md += '## Competitors\n' + (d.competitors || []).map(function(c) { return '- **' + c.name + '** (' + (c.category||'') + ') — ' + (c.description||''); }).join('\n') + '\n\n';
  md += '## Predicted Moves\n' + (d.predictedMoves || []).map(function(m) { return '- ' + m; }).join('\n') + '\n\n';
  md += '## Win/Loss Insights\n' + (d.winLossInsights || []).map(function(w) { return '- ' + w; }).join('\n') + '\n\n';
  md += '---\n_CompetitorSearch — AI Competitive Intelligence_';
  var blob = new Blob([md], {type:'text/markdown'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'intel-' + query.replace(/\s+/g,'-').toLowerCase() + '.md';
  a.click();
  csToast('Report exported as Markdown');
}

function csQuickBattle(a, b) {
  var b1 = document.getElementById('cs-b1');
  var b2 = document.getElementById('cs-b2');
  if (b1) b1.value = a;
  if (b2) b2.value = b;
  csBattle();
}

function csBattle() {
  var q1 = (document.getElementById('cs-b1') || {}).value || '';
  var q2 = (document.getElementById('cs-b2') || {}).value || '';
  q1 = q1.trim(); q2 = q2.trim();
  if (!q1 || !q2) { csToast('Enter two companies to compare.'); return; }

  var out = document.getElementById('cs-battle-result');
  if (!out) return;
  out.innerHTML = '<div class="cs-loading" style="min-height:200px"><div class="cs-spinner"></div><div class="muted">Running battle analysis...</div></div>';

  fetch(API + '/intelligence/battle', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({query1: q1, query2: q2})
  })
  .then(function(r) { return r.json().then(function(d) { return {ok:r.ok,data:d}; }); })
  .then(function(res) {
    if (!res.ok) { out.innerHTML = '<div class="cs-error">' + esc(res.data.error || 'Battle failed.') + '</div>'; return; }
    csDrawBattle(res.data, out);
  })
  .catch(function(e) { out.innerHTML = '<div class="cs-error">Network error: ' + esc(e.message) + '</div>'; });
}

function csDrawBattle(d, container) {
  var DIMS = ['marketShare','innovation','pricing','teamStrength','brandPower','growthRate'];
  var DLBLS = ['Market Share','Innovation','Pricing','Team Strength','Brand Power','Growth Rate'];
  var isW1 = d.winner === (d.company1 && d.company1.name);

  var rowsH = DIMS.map(function(k, i) {
    var c1v = d.company1 && d.company1.dimensions && d.company1.dimensions[k] || 0;
    var c2v = d.company2 && d.company2.dimensions && d.company2.dimensions[k] || 0;
    var w = d.categoryWinners && d.categoryWinners[k] || (c1v >= c2v ? (d.company1 && d.company1.name) : (d.company2 && d.company2.name));
    return '<tr>' +
      '<td>' + DLBLS[i] + '</td>' +
      '<td class="' + (w === (d.company1 && d.company1.name) ? 'cs-dim-win' : '') + '">' + c1v + '</td>' +
      '<td class="' + (w === (d.company2 && d.company2.name) ? 'cs-dim-win' : '') + '">' + c2v + '</td>' +
      '<td class="cs-dim-win">' + esc(w || '-') + '</td></tr>';
  }).join('');

  var c1 = d.company1 || {}; var c2 = d.company2 || {};

  container.innerHTML =
    '<div class="cs-battle-result" style="margin-bottom:16px">' +
      '<div class="cs-battle-side' + (isW1 ? ' winner' : '') + '">' +
        (isW1 ? '<div class="badge badge-gold" style="margin-bottom:10px">WINNER</div><br>' : '') +
        '<div class="cs-b-name">' + esc(c1.name || '') + '</div>' +
        '<div class="cs-b-score">' + (c1.score || 0) + '</div>' +
        '<div class="cs-b-tag">Overall Score</div>' +
        '<div style="margin-top:12px">' +
          (c1.strengths || []).map(function(s) { return '<div style="font-size:12px;color:var(--green);margin-bottom:3px">+ ' + esc(s) + '</div>'; }).join('') +
          (c1.weaknesses || []).map(function(w) { return '<div style="font-size:12px;color:var(--red);margin-bottom:3px">&#8722; ' + esc(w) + '</div>'; }).join('') +
        '</div>' +
      '</div>' +
      '<div class="cs-battle-side' + (!isW1 ? ' winner' : '') + '">' +
        (!isW1 ? '<div class="badge badge-gold" style="margin-bottom:10px">WINNER</div><br>' : '') +
        '<div class="cs-b-name">' + esc(c2.name || '') + '</div>' +
        '<div class="cs-b-score">' + (c2.score || 0) + '</div>' +
        '<div class="cs-b-tag">Overall Score</div>' +
        '<div style="margin-top:12px">' +
          (c2.strengths || []).map(function(s) { return '<div style="font-size:12px;color:var(--green);margin-bottom:3px">+ ' + esc(s) + '</div>'; }).join('') +
          (c2.weaknesses || []).map(function(w) { return '<div style="font-size:12px;color:var(--red);margin-bottom:3px">&#8722; ' + esc(w) + '</div>'; }).join('') +
        '</div>' +
      '</div>' +
      (d.verdict ? '<div class="cs-battle-verdict">' + esc(d.verdict) + '</div>' : '') +
      (d.keyTakeaway ? '<div class="cs-battle-takeaway">"' + esc(d.keyTakeaway) + '"</div>' : '') +
    '</div>' +
    '<div class="cs-box" style="margin-bottom:16px">' +
      '<table class="cs-dim-table"><thead><tr>' +
        '<th>Category</th><th>' + esc(c1.name || '') + '</th><th>' + esc(c2.name || '') + '</th><th>Winner</th>' +

// ─── Modal ────────────────────────────────────────────────────────────────
function csModal(title, content) {
  csCloseModal();
  var bg = document.createElement('div');
  bg.id = 'cs-modal-bg';
  bg.className = 'cs-modal-bg';
  bg.onclick = function(e) { if (e.target === bg) csCloseModal(); };
  bg.innerHTML =
    '<div class="cs-modal">' +
      '<div class="cs-modal-hdr">' +
        '<div class="cs-modal-title">' + title + '</div>' +
        '<button class="cs-modal-close" onclick="csCloseModal()">&#10005;</button>' +
      '</div>' +
      content +
    '</div>';
  document.body.appendChild(bg);
}
function csCloseModal() {
  var el = document.getElementById('cs-modal-bg');
  if (el) el.remove();
}
